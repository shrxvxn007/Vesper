[pytest]
minversion = 7.0
testpaths = tests
# Add the repo root to ``sys.path`` so tests can write ``import vesper.X``
# without per-test ``sys.path`` hacks. This keeps the namespace package
# (``vesper/``) importable when ``vesper`` is not installed in site-packages,
# so CI does not need ``pip install -e .``.
pythonpath = ["."]
addopts = -ra --strict-markers
markers =
    network: hits live SEC EDGAR (skipped by default; opt in with ``pytest -m network``)
filterwarnings =
    ignore::DeprecationWarning
